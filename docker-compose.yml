# Infraestructura local del pipeline. Backbone de eventos, contrato, object
# storage y estado. Los servicios de aplicacion (ingest, worker, ...) se anaden
# en sus propios compose/override a medida que existen.
#
#   docker compose up -d
#
# Puertos en el host:
#   9092  Kafka (bootstrap)            8081  Schema Registry
#   8080  Kafka UI                     9000  MinIO API
#   9001  MinIO consola                5433  Postgres (5432 ocupado en el host)

name: meetscope

services:
  kafka:
    image: confluentinc/cp-kafka:7.7.1
    container_name: meetscope-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_LISTENERS: PLAINTEXT://kafka:29092,CONTROLLER://kafka:29093,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 10
    volumes:
      - kafka-data:/var/lib/kafka/data

  schema-registry:
    image: confluentinc/cp-schema-registry:7.7.1
    container_name: meetscope-schema-registry
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:29092
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
      SCHEMA_REGISTRY_SCHEMA_COMPATIBILITY_LEVEL: backward
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/subjects"]
      interval: 10s
      timeout: 5s
      retries: 10

  kafka-topics-init:
    image: confluentinc/cp-kafka:7.7.1
    container_name: meetscope-kafka-topics-init
    depends_on:
      kafka:
        condition: service_healthy
    # Crea los topics del contrato de forma idempotente y termina.
    command: >
      bash -c '
      for t in audio.uploaded transcript.created enrichment.completed indexing.completed; do
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic "$$t" --partitions 3 --replication-factor 1;
      done;
      echo "topics listos:";
      kafka-topics --bootstrap-server kafka:29092 --list
      '
    restart: "no"

  kafka-ui:
    image: kafbat/kafka-ui:latest
    container_name: meetscope-kafka-ui
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_SCHEMAREGISTRY: http://schema-registry:8081
      DYNAMIC_CONFIG_ENABLED: "true"

  minio:
    image: minio/minio:latest
    container_name: meetscope-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - minio-data:/data

  minio-init:
    image: minio/mc:latest
    container_name: meetscope-minio-init
    depends_on:
      minio:
        condition: service_healthy
    # Crea el bucket de audio de forma idempotente y termina.
    entrypoint: >
      /bin/sh -c '
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing local/meetscope-audio;
      echo "bucket listo:";
      mc ls local
      '
    restart: "no"

  postgres:
    image: postgres:16
    container_name: meetscope-postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: meetscope
      POSTGRES_USER: meetscope
      POSTGRES_PASSWORD: meetscope
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U meetscope -d meetscope"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

volumes:
  kafka-data:
  minio-data:
  postgres-data:
